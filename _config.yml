title: Ravi Bhagwandin
name: Ravi Bhagwandin
description: >
  Software developer based in Toronto. I write about software engineering,
  leadership, and whatever else is on my mind. All opinions are my own.
url: "https://ravib.dev"
baseurl: ""

remote_theme: mmistakes/minimal-mistakes@4.26.2
minimal_mistakes_skin: dark

author:
  name: "Ravi Bhagwandin"
  bio: "Software developer and engineering leader based in Toronto. 10+ years across the stack."
  location: "Toronto, Canada"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ravibhagw"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/ravibhagw"

# Site footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ravibhagw"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/ravibhagw"
    - label: "Feed"
      icon: "fas fa-fw fa-rss-square"
      url: "/feed.xml"

# Reading files
include:
  - _pages

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Pagination
paginate: 5
paginate_path: /blog/page:num/

# Permalinks
permalink: /:year/:month/:day/:title/

# Defaults
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

highlighter: rouge

sass:
  style: :compressed

exclude:
  - vendor/
  - .bundle/
