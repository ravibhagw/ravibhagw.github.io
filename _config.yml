title: Ravi Bhagwandin
author: Ravi Bhagwandin
url: "https://ravib.dev"
baseurl: ""
description: >
  Software developer based in Toronto. I write about software engineering,
  leadership, and whatever else is on my mind. All opinions are my own.

permalink: /:slug

twitter:
  username: ravibhagw
  card: summary_large_image

remote_theme: abhinavs/moonwalk

theme_config:
  appearance: "dark"
  appearance_toggle: true
  date_format: "%B %-d, %Y"
  show_description: true
  show_navbar: true
  show_footer: true
  show_copyright: true
  show_projects: true
  show_blog: true
  show_old_projects: true
  show_misc_list: false
  show_reading_time: true
  show_tags: true
  show_code_copy: true
  show_progress_bar: true
  show_back_to_top: true
  show_post_nav: true
  show_toc: false
  show_footnote_tooltips: true
  show_link_previews: false
  home:
    title_projects: Portfolio
    title_blog: Recent Posts
    title_old_projects: More Projects

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-remote-theme

highlighter: rouge

sass:
  style: :compressed

exclude:
  - Gemfile.lock
  - vendor/
